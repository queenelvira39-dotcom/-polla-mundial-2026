# ============================================================
# POLLA MUNDIAL 2026 v2 — Configuración Netlify
# ============================================================

[build]
  publish = "src"
  functions = "netlify/functions"
  command = "npm install"

[build.environment]
  NODE_VERSION = "20"

# ── REDIRECTS ─────────────────────────────────────────────────
[[redirects]]
  from = "/app"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/"
  to = "/app.html"
  status = 200

# ── HEADERS DE SEGURIDAD ──────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/admin.html"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/app.html"
  [headers.values]
    Cache-Control = "no-store"

# ── CRON JOBS ─────────────────────────────────────────────────
# Descomenta estas líneas cuando pases a producción:
# [functions."scheduled-reminders"]
#   schedule = "* * * * *"
